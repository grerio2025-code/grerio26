<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
let playlistData = [];
let currentIndex = 0;
let retryCount = 0;
const MAX_RETRY = 3;
const RETRY_DELAY = 5000;

const video = document.getElementById("video");
const menu = document.getElementById("menu");
const msg = document.getElementById("msg");
const m3uInput = document.getElementById("m3uurl");
const loadBtn = document.getElementById("loadBtn");

let hls = null;
let menuActive = false;

const CORS_PROXY = "https://api.allorigins.win/raw?url=";

function showMessage(text) {
  console.log(text);
  msg.textContent = text;
}

// --- FORCE HTTPS ---
function forceHTTPS(url) {
  if (url.startsWith("http://")) {
    return url.replace("http://", "https://");
  }
  return url;
}

// --- Load playlist ---
async function loadPlaylist(url) {
  try {
    showMessage("Loading playlist...");

    // try direct first
    let res;
    try {
      res = await fetch(url);
      if (!res.ok) throw new Error();
    } catch {
      showMessage("Direct fetch failed, trying proxy...");
      res = await fetch(CORS_PROXY + encodeURIComponent(url));
    }

    const text = await res.text();

    const lines = text.split("\n");
    let title = "Channel";
    playlistData = [];

    lines.forEach(line => {
      line = line.trim();
      if (line.startsWith("#EXTINF")) {
        title = line.split(",")[1] || "Channel";
      } else if (line && line.startsWith("http")) {
        playlistData.push({ 
          url: forceHTTPS(line), 
          title: title 
        });
      }
    });

    if (!playlistData.length) throw new Error("Playlist kosong");

    showMessage("Loaded " + playlistData.length + " channels");
    playChannel(0);

  } catch(e) {
    showMessage("Error: " + e.message);
  }
}

// --- Play channel ---
function playChannel(index) {
  if (!playlistData.length) return;

  currentIndex = index;
  retryCount = 0;

  const url = playlistData[currentIndex].url;
  showMessage("Playing: " + playlistData[currentIndex].title);

  if (hls) {
    hls.destroy();
    hls = null;
  }

  const startPlayback = () => {
    console.log("Trying stream:", url);

    if (Hls.isSupported()) {
      hls = new Hls({
        debug: false
      });

      hls.loadSource(url);
      hls.attachMedia(video);

      hls.on(Hls.Events.ERROR, (event, data) => {
        console.error("HLS error:", data);

        if (data.fatal) {
          switch(data.type) {
            case Hls.ErrorTypes.NETWORK_ERROR:
              showMessage("Network error, retrying...");
              hls.startLoad();
              break;

            case Hls.ErrorTypes.MEDIA_ERROR:
              showMessage("Media error, recovering...");
              hls.recoverMediaError();
              break;

            default:
              retryOrNext();
              break;
          }
        }
      });

    } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
      video.src = url;
    } else {
      showMessage("HLS not supported");
    }

    video.play().catch(err => {
      console.warn("Play error:", err);
    });
  };

  function retryOrNext() {
    if (retryCount < MAX_RETRY) {
      retryCount++;
      showMessage(`Retry ${retryCount}/${MAX_RETRY}...`);
      setTimeout(startPlayback, RETRY_DELAY);
    } else {
      showMessage("Failed → Next channel");
      nextChannel();
    }
  }

  startPlayback();
}

// --- Navigation ---
function nextChannel() {
  if (!playlistData.length) return;
  currentIndex = (currentIndex + 1) % playlistData.length;
  playChannel(currentIndex);
}

function prevChannel() {
  if (!playlistData.length) return;
  currentIndex = (currentIndex - 1 + playlistData.length) % playlistData.length;
  playChannel(currentIndex);
}

// --- Menu ---
function renderMenu() {
  menu.innerHTML = "";
  playlistData.forEach((ch, i) => {
    const div = document.createElement("div");
    div.textContent = ch.title;
    div.className = "menu-item" + (i === currentIndex ? " active" : "");
    div.onclick = () => { playChannel(i); hideMenu(); };
    menu.appendChild(div);
  });
}

function showMenu() {
  menuActive = true;
  menu.style.display = "block";
  renderMenu();
}

function hideMenu() {
  menuActive = false;
  menu.style.display = "none";
}

// --- Keyboard ---
document.addEventListener("keydown", e => {
  if (menuActive) {
    if (e.key === "Escape") hideMenu();
    return;
  }

  switch(e.key) {
    case "ArrowRight": nextChannel(); break;
    case "ArrowLeft": prevChannel(); break;
    case "ArrowDown": showMenu(); break;
    case "r":
      const url = m3uInput.value.trim();
      if (url) loadPlaylist(url);
      break;
  }
});

// --- Button ---
loadBtn.onclick = () => {
  const url = m3uInput.value.trim();
  if (url) loadPlaylist(url);
};
</script>
